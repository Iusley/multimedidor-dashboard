<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>SVoltix Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">

<style>

:root{
    --bg:#0b1220;
    --panel:#111c31;
    --panel2:#182743;
    --border:#26395e;
    --text:#e8eef8;
    --muted:#93a4c0;
    --accent:#5eead4;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Inter',sans-serif;
    background:var(--bg);
    color:var(--text);
}

.topbar{

    height:70px;

    display:flex;
    align-items:center;
    justify-content:space-between;

    padding:0 25px;

    background:#0f192c;

    border-bottom:1px solid var(--border);
}

.logo{

    font-family:'Space Grotesk',sans-serif;

    font-size:24px;

    font-weight:700;
}

.usuario{

    color:var(--muted);
}

.container{

    padding:20px;
}

.cards{

    display:grid;

    grid-template-columns:
    repeat(auto-fit,minmax(250px,1fr));

    gap:20px;

    margin-bottom:25px;
}

.card{

    background:var(--panel);

    border:1px solid var(--border);

    border-radius:14px;

    padding:20px;
}

.card h3{

    color:var(--muted);

    font-size:14px;

    margin-bottom:10px;
}

.valor{

    font-size:32px;

    font-weight:700;
}

.grafico{

    background:var(--panel);

    border:1px solid var(--border);

    border-radius:14px;

    padding:20px;

    margin-bottom:25px;
}

.tabela{

    background:var(--panel);

    border:1px solid var(--border);

    border-radius:14px;

    padding:20px;
}

table{

    width:100%;

    border-collapse:collapse;
}

th{

    text-align:left;

    padding:10px;

    border-bottom:1px solid var(--border);

    color:var(--muted);
}

td{

    padding:10px;

    border-bottom:1px solid #1c2c49;
}

.status-online{

    color:#00ff88;

    font-weight:600;
}

</style>

</head>

<body>

<div class="topbar">

    <div class="logo">
        SVoltix
    </div>

    <div class="usuario">
        Usuário:
        <span id="usuario"></span>
    </div>

</div>

<div class="container">

    <div class="cards">

        <div class="card">

            <h3>Último Valor</h3>

            <div
            id="ultimoValor"
            class="valor">

            --
            </div>

        </div>

        <div class="card">

            <h3>Total de Registros</h3>

            <div
            id="totalRegistros"
            class="valor">

            --
            </div>

        </div>

        <div class="card">

            <h3>Dispositivo</h3>

            <div
            id="dispositivo"
            class="valor"
            style="font-size:20px">

            --
            </div>

        </div>

        <div class="card">

            <h3>Status</h3>

            <div
            class="valor status-online">

            ONLINE
            </div>

        </div>

    </div>

    <div class="grafico">

        <canvas
        id="grafico">

        </canvas>

    </div>

    <div class="tabela">

        <h2 style="margin-bottom:15px">
            Últimos Registros
        </h2>

        <table>

            <thead>

                <tr>

                    <th>ID</th>

                    <th>Dispositivo</th>

                    <th>Valor</th>

                    <th>Data</th>

                </tr>

            </thead>

            <tbody id="dados">

            </tbody>

        </table>

    </div>

</div>

<script>

document.getElementById(
    "usuario"
).innerText =
localStorage.getItem(
    "usuario"
) || "admin";

let chart;

async function carregar()
{
    try
    {
        const resumo =
            await fetch(
                "/resumo"
            );

        const dadosResumo =
            await resumo.json();

        document.getElementById(
            "ultimoValor"
        ).innerText =
            dadosResumo.ultimo.valor;

        document.getElementById(
            "dispositivo"
        ).innerText =
            dadosResumo.ultimo.dispositivo;

        document.getElementById(
            "totalRegistros"
        ).innerText =
            dadosResumo.total;

        const ultimos =
            await fetch(
                "/ultimos"
            );

        const dados =
            await ultimos.json();

        let html = "";

        dados.forEach(item =>
        {
            html += `
            <tr>

                <td>${item.id}</td>

                <td>${item.dispositivo}</td>

                <td>${item.valor}</td>

                <td>
                ${new Date(
                    item.created_at
                ).toLocaleString()}
                </td>

            </tr>
            `;
        });

        document.getElementById(
            "dados"
        ).innerHTML =
            html;

        const labels =
            dados
            .slice()
            .reverse()
            .map(
                item => item.id
            );

        const valores =
            dados
            .slice()
            .reverse()
            .map(
                item => item.valor
            );

        if(chart)
        {
            chart.destroy();
        }

        chart =
            new Chart(
                document.getElementById(
                    "grafico"
                ),
                {
                    type:'line',

                    data:
                    {
                        labels,

                        datasets:
                        [
                            {
                                label:
                                'Telemetria',

                                data:
                                valores,

                                borderColor:
                                '#5eead4',

                                tension:
                                0.3
                            }
                        ]
                    },

                    options:
                    {
                        responsive:true
                    }
                }
            );

    }
    catch(error)
    {
        console.error(error);
    }
}

carregar();

setInterval(
    carregar,
    5000
);

</script>

</body>
</html>
