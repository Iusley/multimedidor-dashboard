<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SVoltix Dashboard</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">

<style>

:root{
    --bg: #0b1220;
    --bg-soft: #0f1a2e;
    --panel: #121d33;
    --panel-border: #223252;
    --text: #e7edf7;
    --text-muted: #8ea0bd;
    --accent: #5eead4;
    --accent-soft: rgba(94,234,212,0.12);
    --online: #34d399;
    --offline: #f87171;
    --danger: #f87171;
    --danger-hover: #ef4444;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Inter',Arial,sans-serif;
    background:
        radial-gradient(circle at 15% 0%, rgba(94,234,212,0.08), transparent 40%),
        radial-gradient(circle at 85% 100%, rgba(94,234,212,0.05), transparent 45%),
        var(--bg);
    color:var(--text);
    min-height:100vh;
    padding:32px 20px;
}

.container{
    max-width:1000px;
    margin:auto;
}

.card{
    background:var(--panel);
    border:1px solid var(--panel-border);
    border-radius:18px;
    padding:32px;
    box-shadow:0 20px 60px rgba(0,0,0,0.35);
}

.topbar{
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
    margin-bottom:28px;
    gap:16px;
    flex-wrap:wrap;
}

.brand{
    display:flex;
    align-items:center;
    gap:12px;
}

.brand-mark{
    width:42px;
    height:42px;
    border-radius:10px;
    background:var(--accent-soft);
    border:1px solid rgba(94,234,212,0.35);
    display:flex;
    align-items:center;
    justify-content:center;
    flex-shrink:0;
}

.brand-mark svg{
    width:22px;
    height:22px;
}

h1{
    font-family:'Space Grotesk',sans-serif;
    font-size:24px;
    font-weight:700;
    letter-spacing:0.01em;
    color:var(--text);
    line-height:1.2;
}

.subtitle{
    color:var(--text-muted);
    font-size:13px;
    margin-top:2px;
    display:flex;
    align-items:center;
    gap:8px;
}

.live-dot{
    width:7px;
    height:7px;
    border-radius:50%;
    background:var(--online);
    box-shadow:0 0 0 0 rgba(52,211,153,0.6);
    animation:pulse 2s infinite;
}

@keyframes pulse{
    0%   { box-shadow:0 0 0 0 rgba(52,211,153,0.55); }
    70%  { box-shadow:0 0 0 6px rgba(52,211,153,0); }
    100% { box-shadow:0 0 0 0 rgba(52,211,153,0); }
}

.topbar-right{
    display:flex;
    align-items:center;
    gap:14px;
}

#usuarioLogado{
    font-size:13px;
    color:var(--text-muted);
    text-align:right;
}

#usuarioLogado b{
    color:var(--text);
    font-weight:600;
}

.logout{
    background:transparent;
    color:var(--danger);
    border:1px solid rgba(248,113,113,0.4);
    border-radius:8px;
    padding:9px 18px;
    cursor:pointer;
    font-size:13px;
    font-weight:600;
    font-family:inherit;
    transition:background 0.15s ease, border-color 0.15s ease, color 0.15s ease;
}

.logout:hover{
    background:rgba(248,113,113,0.1);
    border-color:var(--danger-hover);
    color:#fca5a5;
}

.section-label{
    font-family:'JetBrains Mono',monospace;
    font-size:11px;
    letter-spacing:0.12em;
    text-transform:uppercase;
    color:var(--text-muted);
    margin-bottom:14px;
    padding-bottom:10px;
    border-bottom:1px solid var(--panel-border);
}

.equipamentos-grid{
    display:flex;
    flex-direction:column;
    gap:10px;
}

.equipamento{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:18px 20px;
    background:var(--bg-soft);
    border:1px solid var(--panel-border);
    border-radius:12px;
    transition:border-color 0.15s ease, transform 0.15s ease;
}

.equipamento:hover{
    border-color:rgba(94,234,212,0.35);
}

.info{
    display:flex;
    align-items:center;
    gap:14px;
}

.status{
    width:10px;
    height:10px;
    border-radius:50%;
    flex-shrink:0;
}

.online{
    background:var(--online);
    box-shadow:0 0 0 3px rgba(52,211,153,0.18);
}

.offline{
    background:var(--offline);
    box-shadow:0 0 0 3px rgba(248,113,113,0.18);
}

.nome{
    font-weight:600;
    color:var(--text);
    font-size:15px;
}

.status-text{
    font-family:'JetBrains Mono',monospace;
    font-size:11px;
    color:var(--text-muted);
    text-transform:uppercase;
    letter-spacing:0.08em;
}

.valor{
    font-family:'JetBrains Mono',monospace;
    font-size:20px;
    font-weight:600;
    color:var(--accent);
}

.empty, .erro{
    padding:40px 20px;
    text-align:center;
    color:var(--text-muted);
    font-size:14px;
}

.erro{
    color:var(--danger);
}

.footer{
    margin-top:24px;
    text-align:center;
    color:var(--text-muted);
    font-size:12px;
    font-family:'JetBrains Mono',monospace;
    letter-spacing:0.04em;
}

@media (max-width:480px){
    .card{ padding:22px; }
    .topbar{ flex-direction:column; }
    .topbar-right{ width:100%; justify-content:space-between; }
}

</style>

</head>

<body>

<div class="container">

<div class="card">

<div class="topbar">

<div class="brand">

<div class="brand-mark">
<svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
<path d="M13 2L4 14H11L10 22L20 10H13L14 2Z" stroke="#5eead4" stroke-width="1.6" stroke-linejoin="round" fill="rgba(94,234,212,0.15)"/>
</svg>
</div>

<div>
<h1>SVoltix</h1>
<div class="subtitle">
<span class="live-dot"></span>
Monitoramento em tempo real
</div>
</div>

</div>

<div class="topbar-right">
<div id="usuarioLogado"></div>
<button class="logout" onclick="sair()">Sair</button>
</div>

</div>

<div class="section-label">Equipamentos</div>

<div class="equipamentos-grid" id="equipamentos">
<div class="empty">Carregando equipamentos...</div>
</div>

<div class="footer">
Atualização automática a cada 5 segundos
</div>

</div>

</div>

<script>

if(localStorage.getItem("logado") != "sim")
{
    location.href = "index.html";
}

document.getElementById(
    "usuarioLogado"
).innerHTML =
"<b>Usuário:</b> " +
localStorage.getItem("usuario");

const SUPABASE_URL =
"https://ylhmtbmrsmqcccgncjnr.supabase.co";

const API_KEY =
"sb_publishable_9dtpI4xp3oLuR36WTvbYSg_rEzY6Yrk";

async function atualizar()
{
    try
    {
        const response =
        await fetch(
            `${SUPABASE_URL}/rest/v1/telemetria?select=*&order=id.desc`,
            {
                headers:
                {
                    apikey: API_KEY,
                    Authorization:
                    `Bearer ${API_KEY}`
                }
            });

        const dados =
            await response.json();

        const dispositivos = {};

        dados.forEach(item =>
        {
            if(
                !dispositivos[
                    item.dispositivo
                ])
            {
                dispositivos[
                    item.dispositivo
                ] = item;
            }
        });

        let html = "";

        Object.values(
            dispositivos
        ).forEach(item =>
        {
            const ultimoContato =
                new Date(
                    item.created_at);

            const agora =
                new Date();

            const segundos =
                (agora -
                ultimoContato) /
                1000;

            const statusClass =
                segundos < 60
                ? "online"
                : "offline";

            const statusLabel =
                segundos < 60
                ? "Online"
                : "Offline";

            html += `
            <div class="equipamento">

                <div class="info">

                    <div class="status ${statusClass}">
                    </div>

                    <div>
                        <div class="nome">
                            ${item.dispositivo}
                        </div>
                        <div class="status-text">
                            ${statusLabel}
                        </div>
                    </div>

                </div>

                <div class="valor">
                    ${item.valor}
                </div>

            </div>
            `;
        });

        if(html === "")
        {
            html =
            "<div class=\"empty\">Nenhum equipamento encontrado.</div>";
        }

        document.getElementById(
            "equipamentos"
        ).innerHTML = html;
    }
    catch(error)
    {
        console.error(error);

        document.getElementById(
            "equipamentos"
        ).innerHTML =
        "<div class=\"erro\">Erro ao consultar Supabase.</div>";
    }
}

function sair()
{
    localStorage.clear();

    location.href =
        "index.html";
}

atualizar();

setInterval(
    atualizar,
    5000);

</script>

</body>
</html>
