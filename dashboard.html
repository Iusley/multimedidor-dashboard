<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SVoltix Dashboard</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial,Helvetica,sans-serif;
    background:#f1f5f9;
    padding:30px;
}

.container{
    max-width:1000px;
    margin:auto;
}

.card{
    background:white;
    border-radius:16px;
    padding:30px;
    box-shadow:0 4px 20px rgba(0,0,0,0.08);
}

h1{
    margin-bottom:10px;
    color:#0f172a;
}

.subtitle{
    color:#64748b;
    margin-bottom:25px;
}

.topbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:20px;
}

.logout{
    background:#ef4444;
    color:white;
    border:none;
    border-radius:8px;
    padding:10px 16px;
    cursor:pointer;
}

.logout:hover{
    background:#dc2626;
}

.equipamento{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:16px;
    border-bottom:1px solid #e2e8f0;
}

.info{
    display:flex;
    align-items:center;
    gap:12px;
}

.status{
    width:14px;
    height:14px;
    border-radius:50%;
}

.online{
    background:#22c55e;
}

.offline{
    background:#ef4444;
}

.nome{
    font-weight:bold;
    color:#0f172a;
}

.valor{
    font-size:20px;
    font-weight:bold;
    color:#2563eb;
}

.footer{
    margin-top:20px;
    text-align:center;
    color:#64748b;
    font-size:13px;
}

</style>

</head>

<body>

<div class="container">

<div class="card">

<div class="topbar">

<div>

<h1>SVoltix</h1>

<div class="subtitle">
Monitoramento em tempo real
</div>

</div>

<button
class="logout"
onclick="sair()">
Sair
</button>

</div>

<div id="usuarioLogado"></div>

<br>

<div id="equipamentos">

Carregando equipamentos...

</div>

<div class="footer">

Atualização automática a cada 5 segundos

</div>

</div>

</div>

<script>

if(localStorage.getItem("logado") != "sim")
{
    location.href = "index.html";
}

document.getElementById(
    "usuarioLogado"
).innerHTML =
"<b>Usuário:</b> " +
localStorage.getItem("usuario");

const SUPABASE_URL =
"https://ylhmtbmrsmqcccgncjnr.supabase.co";

const API_KEY =
"sb_publishable_9dtpI4xp3oLuR36WTvbYSg_rEzY6Yrk";

async function atualizar()
{
    try
    {
        const response =
        await fetch(
            `${SUPABASE_URL}/rest/v1/telemetria?select=*&order=id.desc`,
            {
                headers:
                {
                    apikey: API_KEY,
                    Authorization:
                    `Bearer ${API_KEY}`
                }
            });

        const dados =
            await response.json();

        const dispositivos = {};

        dados.forEach(item =>
        {
            if(
                !dispositivos[
                    item.dispositivo
                ])
            {
                dispositivos[
                    item.dispositivo
                ] = item;
            }
        });

        let html = "";

        Object.values(
            dispositivos
        ).forEach(item =>
        {
            const ultimoContato =
                new Date(
                    item.created_at);

            const agora =
                new Date();

            const segundos =
                (agora -
                ultimoContato) /
                1000;

            const statusClass =
                segundos < 60
                ? "online"
                : "offline";

            html += `
            <div class="equipamento">

                <div class="info">

                    <div class="status ${statusClass}">
                    </div>

                    <div class="nome">
                        ${item.dispositivo}
                    </div>

                </div>

                <div class="valor">
                    ${item.valor}
                </div>

            </div>
            `;
        });

        if(html === "")
        {
            html =
            "<p>Nenhum equipamento encontrado.</p>";
        }

        document.getElementById(
            "equipamentos"
        ).innerHTML = html;
    }
    catch(error)
    {
        console.error(error);

        document.getElementById(
            "equipamentos"
        ).innerHTML =
        "<p>Erro ao consultar Supabase.</p>";
    }
}

function sair()
{
    localStorage.clear();

    location.href =
        "index.html";
}

atualizar();

setInterval(
    atualizar,
    5000);

</script>

</body>
</html>
