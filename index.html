<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>SVoltix · Login</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">

<style>

:root{
    --bg:#0b1220;
    --bg-soft:#0f1a2e;
    --panel:#121d33;
    --panel-border:#223252;
    --text:#e7edf7;
    --text-muted:#8ea0bd;
    --accent:#5eead4;
    --accent-soft:rgba(94,234,212,.12);
    --danger:#f87171;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Inter',sans-serif;
    background:
        radial-gradient(circle at 15% 0%, rgba(94,234,212,.08), transparent 40%),
        radial-gradient(circle at 85% 100%, rgba(94,234,212,.05), transparent 45%),
        var(--bg);

    min-height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;

    padding:20px;

    color:var(--text);
}

.card{
    width:100%;
    max-width:380px;

    background:var(--panel);

    border:1px solid var(--panel-border);

    border-radius:18px;

    padding:35px;

    box-shadow:0 20px 60px rgba(0,0,0,.35);
}

.logo{
    text-align:center;
    margin-bottom:30px;
}

.logo h1{
    font-family:'Space Grotesk',sans-serif;
    font-size:28px;
}

.logo p{
    color:var(--text-muted);
    margin-top:8px;
    font-size:13px;
}

.campo{
    margin-bottom:18px;
}

label{
    display:block;

    margin-bottom:8px;

    color:var(--text-muted);

    font-size:12px;

    text-transform:uppercase;

    letter-spacing:.08em;
}

input{
    width:100%;

    padding:12px;

    border-radius:10px;

    border:1px solid var(--panel-border);

    background:var(--bg-soft);

    color:white;

    outline:none;
}

input:focus{
    border-color:var(--accent);
}

button{
    width:100%;

    padding:13px;

    border:none;

    border-radius:10px;

    background:var(--accent);

    color:#04141f;

    font-weight:700;

    cursor:pointer;
}

button:hover{
    opacity:.9;
}

#msg{
    margin-top:15px;
    text-align:center;
    color:var(--danger);
    min-height:20px;
}

.info{
    margin-top:25px;

    text-align:center;

    font-size:12px;

    color:var(--text-muted);
}

</style>

</head>
<body>

<div class="card">

    <div class="logo">
        <h1>SVoltix</h1>
        <p>Plataforma de Monitoramento Industrial</p>
    </div>

    <div class="campo">
        <label>Usuário</label>
        <input
            id="usuario"
            placeholder="Digite seu usuário">
    </div>

    <div class="campo">
        <label>Senha</label>
        <input
            id="senha"
            type="password"
            placeholder="Digite sua senha">
    </div>

    <button onclick="login()">
        Entrar
    </button>

    <div id="msg"></div>

    <div class="info">
        SVoltix Platform v1.0
    </div>

</div>

<script>

async function login()
{
    const usuario =
        document.getElementById(
            "usuario"
        ).value.trim();

    const senha =
        document.getElementById(
            "senha"
        ).value.trim();

    const msg =
        document.getElementById(
            "msg"
        );

    msg.innerText = "";

    if(
        usuario === "" ||
        senha === ""
    )
    {
        msg.innerText =
            "Preencha usuário e senha";

        return;
    }

    try
    {
        const resposta =
            await fetch(
                "/login",
                {
                    method:"POST",
                    headers:
                    {
                        "Content-Type":
                        "application/json"
                    },
                    body:
                    JSON.stringify({
                        usuario,
                        senha
                    })
                }
            );

        const dados =
            await resposta.json();

        if(dados.sucesso)
        {
            localStorage.setItem(
                "logado",
                "sim"
            );

            localStorage.setItem(
                "usuario",
                usuario
            );

            location.href =
                "/dashboard.html";
        }
        else
        {
            msg.innerText =
                "Usuário ou senha inválidos";
        }
    }
    catch(error)
    {
        console.error(error);

        msg.innerText =
            "Erro ao conectar ao servidor";
    }
}

document
.getElementById("senha")
.addEventListener(
    "keydown",
    function(e)
    {
        if(e.key === "Enter")
        {
            login();
        }
    }
);

</script>

</body>
</html>
